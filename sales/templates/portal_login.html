<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Customer portal — Gargoyle Packy</title>
<style>
  :root { --bg: #0c0e12; --fg: #e6e8eb; --muted: #9ba1ab; --accent: #ffb454; --card: #181c24; --line: #2a2f38; }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0; background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    line-height: 1.5;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  .card {
    background: var(--card); border: 1px solid var(--line);
    border-radius: 8px; padding: 32px; max-width: 420px; width: 100%;
  }
  h1 { margin: 0 0 4px; font-size: 22px; }
  p.lede { color: var(--muted); margin: 0 0 24px; font-size: 14px; }
  label { display: block; font-size: 13px; color: var(--muted); margin: 12px 0 4px; }
  input {
    width: 100%; padding: 10px 12px; background: #0c0e12;
    border: 1px solid var(--line); border-radius: 6px;
    color: var(--fg); font-size: 15px;
  }
  input:focus { outline: 1px solid var(--accent); border-color: var(--accent); }
  button {
    margin-top: 20px; width: 100%; padding: 12px;
    background: var(--accent); color: #1a1300; border: none;
    border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 15px;
  }
  button:hover { background: #ff7e36; }
  .error { color: #ff7e36; background: #2a1810; border: 1px solid #5a2a1a;
           padding: 8px 12px; border-radius: 6px; font-size: 13px; margin-bottom: 12px; }
  .help { color: var(--muted); font-size: 12px; margin-top: 16px; }
</style>
</head>
<body>
  <div class="card">
    <h1>Customer portal</h1>
    <p class="lede">Re-download your Gargoyle Packy license.</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST" action="/portal">
      <label for="license_id">License ID</label>
      <input id="license_id" name="license_id" type="text"
             value="{{ license_id }}" placeholder="KFG-PROD-XXXXXXXX" required autofocus />
      <label for="email">Email used at purchase</label>
      <input id="email" name="email" type="email" required
             placeholder="you@company.com" />
      <button type="submit">Get my license</button>
    </form>
    <p class="help">
      Lost the email? Contact
      <a href="mailto:support@kirkforge.com">support@kirkforge.com</a>.
    </p>
  </div>
</body>
</html>
