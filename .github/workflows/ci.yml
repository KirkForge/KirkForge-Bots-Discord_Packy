name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run all tests (Vitest)
        run: npm run test:ci

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npm run typecheck

      - name: Run Prettier check
        run: npm run fmt:check

  lint-python:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install -e ".[dev]"

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

      - name: Run mypy
        run: mypy src/ --ignore-missing-imports --no-error-summary --disable-error-code=attr-defined --disable-error-code=assignment --disable-error-code=arg-type --disable-error-code=truthy-function --disable-error-code=call-overload --disable-error-code=misc --disable-error-code=has-type --disable-error-code=var-annotated --disable-error-code=call-arg --disable-error-code=union-attr --disable-error-code=no-implicit-optional

  pytest:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install -e ".[dev]"

      - name: Run pytest with coverage
        run: PYTHONPATH=. pytest tests/ test/ -q --cov=src --cov-report=xml --cov-report=term-missing --cov-fail-under=40
        env:
          PACKY_API_SECRET: test-secret-for-ci
          PACKY_DEV_LICENSE: "1"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml